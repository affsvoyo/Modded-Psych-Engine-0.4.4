name: Android CI

on:
  push:
    branches: [ main, experimental ]
  pull_request:
    branches: [ main, experimental ]
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Install Haxelib
        run: |
          haxelib install hxcpp
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-tools
          haxelib install flixel-ui
          haxelib install flixel-addons
          haxelib install actuate
          haxelib install hscript
          haxelib install polymod
          haxelib install format
          haxelib install thx.core
          haxelib install tink_core
          haxelib install msignal
          haxelib install hxjsonast
          haxelib install hxCodec
          haxelib install hxvlc
          haxelib install extension-webm
          haxelib install linc_luajit
          haxelib install discord_rpc
          haxelib install json2object
          haxelib install lime-samples
          haxelib install openfl-samples
          haxelib install extension-webm
          haxelib install extension-webview
          haxelib install hxvm-luajit

      - name: Setup Android
        run: |
          haxelib run lime setup
          haxelib run lime setup android

      - name: Test Echod
        run: |
          echo "Creating Echo Version"
          echo "Echo Version Created!!"

      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Compile
        run: haxelib run lime build android --app-version="4.0.0-${{ github.run_id }}" -D officialBuild

      - name: Publish Artifact
        uses: actions/upload-artifact@main
        with:
          name: androidBuild
          path: export/release/android/bin/

  EchoTest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      - name: Test Echo
        run: |
          echo "Tested Echo"

      - name: Publish Artifact
        uses: actions/upload-artifact@main
        with:
          name: echo-log
          path: .
